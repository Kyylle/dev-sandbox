{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 text-center">
    <div class="bg-white rounded-xl shadow p-10">
        <div class="text-6xl mb-4">🔍</div>
        <h1 class="text-8xl font-bold text-blue-600 mb-2">404</h1>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Page Not Found</h2>
        <p class="text-gray-500 mb-6">
            The page you are looking for doesn't exist or has been moved.
        </p>
        <a href="/" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-medium">
            ← Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
